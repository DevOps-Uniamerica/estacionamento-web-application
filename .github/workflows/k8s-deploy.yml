---
- name: Deploy da aplicação no cluster Kubernetes GCP
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    cluster_name: "{{ cluster_name }}"
    cluster_location: "{{ cluster_location }}"
    project_id: "celtic-shape-452222-c9"
    docker_user: "{{ docker_user }}"
    app_namespace: "estacionamento"

  tasks:
    - name: Instalar dependências necessárias
      pip:
        name:
          - kubernetes
          - google-auth
          - google-cloud-container
        state: present

    - name: Configurar kubectl para conectar ao cluster GKE
      shell: |
        gcloud container clusters get-credentials {{ cluster_name }} \
          --location {{ cluster_location }} \
          --project {{ project_id }}

    - name: Criar namespace da aplicação
      kubernetes.core.k8s:
        name: "{{ app_namespace }}"
        api_version: v1
        kind: Namespace
        state: present

    - name: Criar ConfigMap para configuração do banco
      kubernetes.core.k8s:
        definition:
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: postgres-config
            namespace: "{{ app_namespace }}"
          data:
            POSTGRES_DB: "estacionamento"
            POSTGRES_USER: "postgres"
            POSTGRES_PASSWORD: "postgres"

    - name: Criar PersistentVolumeClaim para o banco PostgreSQL
      kubernetes.core.k8s:
        definition:
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: postgres-pvc
            namespace: "{{ app_namespace }}"
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 5Gi

    - name: Deploy do PostgreSQL
      kubernetes.core.k8s:
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: postgres-deployment
            namespace: "{{ app_namespace }}"
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: postgres
            template:
              metadata:
                labels:
                  app: postgres
              spec:
                containers:
                - name: postgres
                  image: postgres:15-alpine
                  env:
                  - name: POSTGRES_DB
                    valueFrom:
                      configMapKeyRef:
                        name: postgres-config
                        key: POSTGRES_DB
                  - name: POSTGRES_USER
                    valueFrom:
                      configMapKeyRef:
                        name: postgres-config
                        key: POSTGRES_USER
                  - name: POSTGRES_PASSWORD
                    valueFrom:
                      configMapKeyRef:
                        name: postgres-config
                        key: POSTGRES_PASSWORD
                  ports:
                  - containerPort: 5432
                  volumeMounts:
                  - name: postgres-storage
                    mountPath: /var/lib/postgresql/data
                  resources:
                    requests:
                      memory: "256Mi"
                      cpu: "250m"
                    limits:
                      memory: "512Mi"
                      cpu: "500m"
                  readinessProbe:
                    exec:
                      command:
                        - /bin/sh
                        - -c
                        - pg_isready -U postgres
                    initialDelaySeconds: 10
                    periodSeconds: 5
                  livenessProbe:
                    exec:
                      command:
                        - /bin/sh
                        - -c
                        - pg_isready -U postgres
                    initialDelaySeconds: 30
                    periodSeconds: 10
                volumes:
                - name: postgres-storage
                  persistentVolumeClaim:
                    claimName: postgres-pvc

    - name: Criar Service para PostgreSQL
      kubernetes.core.k8s:
        definition:
          apiVersion: v1
          kind: Service
          metadata:
            name: postgres-service
            namespace: "{{ app_namespace }}"
          spec:
            selector:
              app: postgres
            ports:
            - port: 5432
              targetPort: 5432
            type: ClusterIP

    - name: Aguardar PostgreSQL ficar pronto
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Pod
        namespace: "{{ app_namespace }}"
        label_selectors:
          - app=postgres
        wait: true
        wait_condition:
          type: Ready
          status: "True"
        wait_timeout: 600

    - name: Verificar status do PostgreSQL
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Pod
        namespace: "{{ app_namespace }}"
        label_selectors:
          - app=postgres
      register: postgres_pods

    - name: Debug PostgreSQL
      debug:
        msg: |
          PostgreSQL Pods Status:
          {% for pod in postgres_pods.resources %}
          - Name: {{ pod.metadata.name }}
          - Phase: {{ pod.status.phase }}
          - Ready: {{ pod.status.containerStatuses[0].ready if pod.status.containerStatuses else 'N/A' }}
          {% endfor %}

    - name: Deploy do Backend (Spring Boot)
      kubernetes.core.k8s:
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: backend-deployment
            namespace: "{{ app_namespace }}"
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: backend
            template:
              metadata:
                labels:
                  app: backend
              spec:
                containers:
                - name: backend
                  image: "{{ docker_user }}/estacionamento-backend:latest"
                  imagePullPolicy: Always
                  env:
                  - name: SPRING_DATASOURCE_URL
                    value: "jdbc:postgresql://postgres-service:5432/estacionamento"
                  - name: SPRING_DATASOURCE_USERNAME
                    value: "postgres"
                  - name: SPRING_DATASOURCE_PASSWORD
                    value: "postgres"
                  - name: JAVA_OPTS
                    value: "-Xmx512m -Xms256m"
                  ports:
                  - containerPort: 8080
                  resources:
                    requests:
                      memory: "512Mi"
                      cpu: "250m"
                    limits:
                      memory: "1Gi"
                      cpu: "500m"
                  readinessProbe:
                    httpGet:
                      path: /actuator/health
                      port: 8080
                    initialDelaySeconds: 60
                    periodSeconds: 10
                    timeoutSeconds: 5
                    failureThreshold: 3
                  livenessProbe:
                    httpGet:
                      path: /actuator/health
                      port: 8080
                    initialDelaySeconds: 120
                    periodSeconds: 30
                    timeoutSeconds: 5
                    failureThreshold: 3

    - name: Criar Service para Backend
      kubernetes.core.k8s:
        definition:
          apiVersion: v1
          kind: Service
          metadata:
            name: backend-service
            namespace: "{{ app_namespace }}"
          spec:
            selector:
              app: backend
            ports:
            - port: 8080
              targetPort: 8080
            type: ClusterIP

    - name: Aguardar Backend ficar pronto (com timeout maior)
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Pod
        namespace: "{{ app_namespace }}"
        label_selectors:
          - app=backend
        wait: true
        wait_condition:
          type: Ready
          status: "True"
        wait_timeout: 900
      register: backend_wait_result
      ignore_errors: true

    - name: Verificar status do Backend se timeout
      when: backend_wait_result.failed
      block:
        - name: Obter logs do Backend
          kubernetes.core.k8s_info:
            api_version: v1
            kind: Pod
            namespace: "{{ app_namespace }}"
            label_selectors:
              - app=backend
          register: backend_pods

        - name: Mostrar logs do Backend
          shell: |
            kubectl logs -n {{ app_namespace }} {{ backend_pods.resources[0].metadata.name }} --tail=50
          register: backend_logs
          when: backend_pods.resources | length > 0

        - name: Debug Backend
          debug:
            msg: |
              Backend não ficou pronto em 15 minutos!
              
              Pods Status:
              {% for pod in backend_pods.resources %}
              - Name: {{ pod.metadata.name }}
              - Phase: {{ pod.status.phase }}
              - Ready: {{ pod.status.containerStatuses[0].ready if pod.status.containerStatuses else 'N/A' }}
              - Restart Count: {{ pod.status.containerStatuses[0].restartCount if pod.status.containerStatuses else 'N/A' }}
              {% endfor %}
              
              Logs:
              {{ backend_logs.stdout if backend_logs is defined else 'Não foi possível obter logs' }}

        - name: Falhar se Backend não estiver pronto
          fail:
            msg: "Backend não ficou pronto após 15 minutos"

    - name: Criar ConfigMap para configuração do Nginx (Frontend)
      kubernetes.core.k8s:
        definition:
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: nginx-config
            namespace: "{{ app_namespace }}"
          data:
            default.conf: |
              server {
                  listen 80;
                  server_name localhost;
                  
                  location / {
                      root /usr/share/nginx/html;
                      index index.html index.htm;
                      try_files $uri $uri/ /index.html;
                  }
                  
                  location /api/ {
                      proxy_pass http://backend-service:8080/;
                      proxy_set_header Host $host;
                      proxy_set_header X-Real-IP $remote_addr;
                      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                      proxy_set_header X-Forwarded-Proto $scheme;
                      proxy_connect_timeout 30s;
                      proxy_send_timeout 30s;
                      proxy_read_timeout 30s;
                  }
                  
                  error_page 500 502 503 504 /50x.html;
                  location = /50x.html {
                      root /usr/share/nginx/html;
                  }
              }

    - name: Deploy do Frontend (Vue.js com Nginx)
      kubernetes.core.k8s:
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: frontend-deployment
            namespace: "{{ app_namespace }}"
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: frontend
            template:
              metadata:
                labels:
                  app: frontend
              spec:
                containers:
                - name: frontend
                  image: "{{ docker_user }}/estacionamento-frontend:latest"
                  imagePullPolicy: Always
                  ports:
                  - containerPort: 80
                  resources:
                    requests:
                      memory: "128Mi"
                      cpu: "100m"
                    limits:
                      memory: "256Mi"
                      cpu: "200m"
                  volumeMounts:
                  - name: nginx-config
                    mountPath: /etc/nginx/conf.d
                  readinessProbe:
                    httpGet:
                      path: /
                      port: 80
                    initialDelaySeconds: 10
                    periodSeconds: 5
                  livenessProbe:
                    httpGet:
                      path: /
                      port: 80
                    initialDelaySeconds: 30
                    periodSeconds: 10
                volumes:
                - name: nginx-config
                  configMap:
                    name: nginx-config

    - name: Criar Service para Frontend
      kubernetes.core.k8s:
        definition:
          apiVersion: v1
          kind: Service
          metadata:
            name: frontend-service
            namespace: "{{ app_namespace }}"
          spec:
            selector:
              app: frontend
            ports:
            - port: 80
              targetPort: 80
            type: LoadBalancer

    - name: Aguardar Frontend ficar pronto
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Pod
        namespace: "{{ app_namespace }}"
        label_selectors:
          - app=frontend
        wait: true
        wait_condition:
          type: Ready
          status: "True"
        wait_timeout: 300

    - name: Obter IP externo do LoadBalancer
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Service
        name: frontend-service
        namespace: "{{ app_namespace }}"
      register: frontend_service

    - name: Exibir informações do deploy
      debug:
        msg: |
          🎉 Deploy realizado com sucesso!
          
          Namespace: {{ app_namespace }}
          
          Serviços criados:
          - PostgreSQL: postgres-service:5432
          - Backend: backend-service:8080  
          - Frontend: frontend-service:80
          
          {% if frontend_service.resources[0].status.loadBalancer.ingress is defined %}
          🌐 IP Externo: {{ frontend_service.resources[0].status.loadBalancer.ingress[0].ip }}
          🚀 Acesse: http://{{ frontend_service.resources[0].status.loadBalancer.ingress[0].ip }}
          {% else %}
          ⏳ LoadBalancer sendo provisionado...
          Execute: kubectl get service frontend-service -n {{ app_namespace }}
          {% endif %}

    - name: Verificar status final dos pods
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Pod
        namespace: "{{ app_namespace }}"
      register: final_pod_status

    - name: Exibir status final
      debug:
        msg: |
          📊 Status Final dos Pods:
          {% for pod in final_pod_status.resources %}
          - {{ pod.metadata.name }}: {{ pod.status.phase }}
            Ready: {{ pod.status.containerStatuses[0].ready if pod.status.containerStatuses else 'N/A' }}
            Restarts: {{ pod.status.containerStatuses[0].restartCount if pod.status.containerStatuses else 'N/A' }}
          {% endfor %}

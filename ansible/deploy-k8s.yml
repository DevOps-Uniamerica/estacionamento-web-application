---
- name: Deploy da aplicação no cluster Kubernetes GCP
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    cluster_name: "{{ cluster_name }}"
    cluster_location: "{{ cluster_location }}"
    project_id: "celtic-shape-452222-c9"
    docker_user: "{{ docker_user }}"
    app_namespace: "estacionamento"
    # Definir credenciais consistentes do PostgreSQL
    postgres_user: "postgres"
    postgres_password: "postgres"
    postgres_db: "estacionamento"

  tasks:
    - name: Instalar dependências necessárias
      pip:
        name:
          - kubernetes
          - google-auth
          - google-cloud-container
        state: present

    - name: Configurar kubectl para conectar ao cluster GKE
      shell: |
        gcloud container clusters get-credentials {{ cluster_name }} \
          --location {{ cluster_location }} \
          --project {{ project_id }}

    - name: Verificar conectividade com o cluster
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Node
      register: nodes_info

    - name: Debug informações do cluster
      debug:
        msg: |
          Cluster conectado com sucesso!
          Nodes disponíveis: {{ nodes_info.resources | length }}
          {% for node in nodes_info.resources %}
          - {{ node.metadata.name }}: {{ node.status.conditions | selectattr('type', 'equalto', 'Ready') | map(attribute='status') | first }}
          {% endfor %}

    # LIMPEZA INICIAL - Remover deployments antigos problemáticos
    - name: Limpar deployments antigos do backend (se houver)
      kubernetes.core.k8s:
        api_version: apps/v1
        kind: Deployment
        name: backend-deployment
        namespace: "{{ app_namespace }}"
        state: absent
        wait: true
        wait_timeout: 120
      ignore_errors: true

    - name: Aguardar remoção completa dos pods antigos
      shell: |
        kubectl wait --for=delete pods -l app=backend -n {{ app_namespace }} --timeout=60s
      ignore_errors: true

    - name: Criar namespace da aplicação
      kubernetes.core.k8s:
        name: "{{ app_namespace }}"
        api_version: v1
        kind: Namespace
        state: present

    - name: Criar Secret para credenciais do PostgreSQL
      kubernetes.core.k8s:
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: postgres-secret
            namespace: "{{ app_namespace }}"
          type: Opaque
          stringData:
            POSTGRES_USER: "{{ postgres_user }}"
            POSTGRES_PASSWORD: "{{ postgres_password }}"
            POSTGRES_DB: "{{ postgres_db }}"

    - name: Criar PersistentVolumeClaim para o banco PostgreSQL
      kubernetes.core.k8s:
        definition:
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: postgres-pvc
            namespace: "{{ app_namespace }}"
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 5Gi
            storageClassName: standard-rwo

    - name: Deploy do PostgreSQL
      kubernetes.core.k8s:
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: postgres-deployment
            namespace: "{{ app_namespace }}"
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: postgres
            template:
              metadata:
                labels:
                  app: postgres
              spec:
                containers:
                - name: postgres
                  image: postgres:15-alpine
                  env:
                  - name: POSTGRES_DB
                    valueFrom:
                      secretKeyRef:
                        name: postgres-secret
                        key: POSTGRES_DB
                  - name: POSTGRES_USER
                    valueFrom:
                      secretKeyRef:
                        name: postgres-secret
                        key: POSTGRES_USER
                  - name: POSTGRES_PASSWORD
                    valueFrom:
                      secretKeyRef:
                        name: postgres-secret
                        key: POSTGRES_PASSWORD
                  - name: PGDATA
                    value: /var/lib/postgresql/data/pgdata
                  ports:
                  - containerPort: 5432
                  volumeMounts:
                  - name: postgres-storage
                    mountPath: /var/lib/postgresql/data
                  resources:
                    requests:
                      memory: "256Mi"
                      cpu: "250m"
                    limits:
                      memory: "512Mi"
                      cpu: "500m"
                  readinessProbe:
                    exec:
                      command:
                        - /bin/sh
                        - -c
                        - pg_isready -U {{ postgres_user }} -d {{ postgres_db }}
                    initialDelaySeconds: 15
                    periodSeconds: 5
                    timeoutSeconds: 10
                    failureThreshold: 6
                  livenessProbe:
                    exec:
                      command:
                        - /bin/sh
                        - -c
                        - pg_isready -U {{ postgres_user }} -d {{ postgres_db }}
                    initialDelaySeconds: 30
                    periodSeconds: 10
                    timeoutSeconds: 10
                    failureThreshold: 6
                volumes:
                - name: postgres-storage
                  persistentVolumeClaim:
                    claimName: postgres-pvc

    - name: Criar Service para PostgreSQL
      kubernetes.core.k8s:
        definition:
          apiVersion: v1
          kind: Service
          metadata:
            name: postgres-service
            namespace: "{{ app_namespace }}"
          spec:
            selector:
              app: postgres
            ports:
            - port: 5432
              targetPort: 5432
            type: ClusterIP

    - name: Aguardar PostgreSQL ficar pronto
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Pod
        namespace: "{{ app_namespace }}"
        label_selectors:
          - app=postgres
        wait: true
        wait_condition:
          type: Ready
          status: "True"
        wait_timeout: 300

    - name: Verificar conectividade com PostgreSQL
      shell: |
        kubectl run postgres-test --image=postgres:15-alpine --rm -i --restart=Never -n {{ app_namespace }} \
          --env="PGPASSWORD={{ postgres_password }}" -- \
          psql -h postgres-service -U {{ postgres_user }} -d {{ postgres_db }} -c "SELECT version();"
      register: postgres_connectivity

    - name: Debug conectividade PostgreSQL
      debug:
        msg: |
          Teste de conectividade PostgreSQL:
          ✅ Conectividade OK
          Output: {{ postgres_connectivity.stdout }}

    # CONFIGURAÇÃO CORRIGIDA DO BACKEND
    - name: Deploy do Backend (Spring Boot) - VERSÃO CORRIGIDA
      kubernetes.core.k8s:
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: backend-deployment
            namespace: "{{ app_namespace }}"
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: backend
            template:
              metadata:
                labels:
                  app: backend
              spec:
                # Init container para aguardar PostgreSQL
                initContainers:
                - name: wait-for-postgres
                  image: postgres:15-alpine
                  env:
                  - name: PGPASSWORD
                    value: "{{ postgres_password }}"
                  command:
                    - sh
                    - -c
                    - |
                      until pg_isready -h postgres-service.{{ app_namespace }}.svc.cluster.local -p 5432 -U {{ postgres_user }}; do
                        echo "Aguardando PostgreSQL..."
                        sleep 5
                      done
                      echo "PostgreSQL está pronto!"
                      # Testar conexão completa
                      psql -h postgres-service.{{ app_namespace }}.svc.cluster.local -p 5432 -U {{ postgres_user }} -d {{ postgres_db }} -c "SELECT 1;" || exit 1
                      echo "Conexão com PostgreSQL validada!"
                containers:
                - name: backend
                  image: "{{ docker_user }}/estacionamento-backend:latest"
                  imagePullPolicy: Always
                  env:
                  - name: SPRING_DATASOURCE_URL
                    value: "jdbc:postgresql://postgres-service.{{ app_namespace }}.svc.cluster.local:5432/{{ postgres_db }}"
                  - name: SPRING_DATASOURCE_USERNAME
                    value: "{{ postgres_user }}"
                  - name: SPRING_DATASOURCE_PASSWORD
                    value: "{{ postgres_password }}"
                  - name: SPRING_JPA_HIBERNATE_DDL_AUTO
                    value: "update"
                  - name: SPRING_JPA_DATABASE_PLATFORM
                    value: "org.hibernate.dialect.PostgreSQLDialect"
                  # Configurações específicas do Actuator para Kubernetes
                  - name: MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE
                    value: "health,info,metrics"
                  - name: MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS
                    value: "always"
                  - name: MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED
                    value: "true"
                  - name: MANAGEMENT_HEALTH_LIVENESSSTATE_ENABLED
                    value: "true"
                  - name: MANAGEMENT_HEALTH_READINESSSTATE_ENABLED
                    value: "true"
                  # Configurações de JVM otimizadas
                  - name: JAVA_OPTS
                    value: "-Xmx768m -Xms512m -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -Djava.security.egd=file:/dev/urandom"
                  # Configurações de timeout do Spring Boot
                  - name: SERVER_TOMCAT_CONNECTION_TIMEOUT
                    value: "20000"
                  - name: SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT
                    value: "30000"
                  - name: SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE
                    value: "10"
                  - name: SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE
                    value: "5"
                  ports:
                  - containerPort: 8080
                    name: http
                  resources:
                    requests:
                      memory: "768Mi"
                      cpu: "500m"
                    limits:
                      memory: "1Gi"
                      cpu: "1000m"
                  # Health checks configurados corretamente
                  readinessProbe:
                    httpGet:
                      path: /actuator/health/readiness
                      port: 8080
                      scheme: HTTP
                    initialDelaySeconds: 120
                    periodSeconds: 10
                    timeoutSeconds: 5
                    successThreshold: 1
                    failureThreshold: 3
                  livenessProbe:
                    httpGet:
                      path: /actuator/health/liveness
                      port: 8080
                      scheme: HTTP
                    initialDelaySeconds: 180
                    periodSeconds: 30
                    timeoutSeconds: 5
                    successThreshold: 1
                    failureThreshold: 3
                  # Startup probe para dar mais tempo na inicialização
                  startupProbe:
                    httpGet:
                      path: /actuator/health
                      port: 8080
                      scheme: HTTP
                    initialDelaySeconds: 60
                    periodSeconds: 10
                    timeoutSeconds: 5
                    successThreshold: 1
                    failureThreshold: 30  # 5 minutos no total

    - name: Criar Service para Backend
      kubernetes.core.k8s:
        definition:
          apiVersion: v1
          kind: Service
          metadata:
            name: backend-service
            namespace: "{{ app_namespace }}"
          spec:
            selector:
              app: backend
            ports:
            - port: 8080
              targetPort: 8080
              name: http
            type: ClusterIP

    # AGUARDAR BACKEND COM DIAGNÓSTICO MELHORADO
    - name: Aguardar Backend ficar pronto (com diagnóstico melhorado)
      block:
        - name: Aguardar Backend startup probe passar
          kubernetes.core.k8s_info:
            api_version: v1
            kind: Pod
            namespace: "{{ app_namespace }}"
            label_selectors:
              - app=backend
            wait: true
            wait_condition:
              type: Ready
              status: "True"
            wait_timeout: 900  # 15 minutos
          register: backend_wait_result

        - name: Testar endpoint do backend diretamente
          shell: |
            POD_NAME=$(kubectl get pods -n {{ app_namespace }} -l app=backend -o jsonpath='{.items[0].metadata.name}')
            kubectl exec -n {{ app_namespace }} $POD_NAME -- curl -f http://localhost:8080/actuator/health
          register: backend_health_test

        - name: Debug sucesso do backend
          debug:
            msg: |
              ✅ Backend está funcionando!
              Health check: {{ backend_health_test.stdout }}

      rescue:
        - name: Diagnóstico completo do Backend
          shell: |
            echo "=== PODS BACKEND ==="
            kubectl get pods -n {{ app_namespace }} -l app=backend -o wide
            
            echo "=== LOGS DOS PODS ==="
            for pod in $(kubectl get pods -n {{ app_namespace }} -l app=backend -o jsonpath='{.items[*].metadata.name}'); do
              echo "--- Logs do pod $pod ---"
              kubectl logs -n {{ app_namespace }} $pod --tail=100
              echo "--- Logs do init container ---"
              kubectl logs -n {{ app_namespace }} $pod -c wait-for-postgres --tail=50 || echo "Sem init container logs"
              echo "--- Describe do pod ---"
              kubectl describe pod -n {{ app_namespace }} $pod
            done
            
            echo "=== EVENTOS ==="
            kubectl get events -n {{ app_namespace }} --sort-by='.lastTimestamp' | grep backend
            
            echo "=== TESTE DE REDE ==="
            kubectl run network-test --image=curlimages/curl --rm -i --restart=Never -n {{ app_namespace }} -- \
              curl -v http://backend-service:8080/actuator/health || echo "Falha no teste de rede"
          register: backend_full_diagnosis

        - name: Mostrar diagnóstico completo
          debug:
            msg: |
              ❌ Backend falhou após 15 minutos!
              
              {{ backend_full_diagnosis.stdout }}

        - name: Tentar estratégia de recuperação
          debug:
            msg: |
              🔄 Continuando com deploy do frontend mesmo com backend com problemas...
              Motivo: Frontend pode funcionar parcialmente e ajudar no diagnóstico.

    - name: Criar ConfigMap para configuração do Nginx (Frontend)
      kubernetes.core.k8s:
        definition:
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: nginx-config
            namespace: "{{ app_namespace }}"
          data:
            default.conf: |
              server {
                  listen 80;
                  server_name localhost;
                  
                  # Configurações de log para debug
                  access_log /var/log/nginx/access.log;
                  error_log /var/log/nginx/error.log debug;
                  
                  location / {
                      root /usr/share/nginx/html;
                      index index.html index.htm;
                      try_files $uri $uri/ /index.html;
                  }
                  
                  location /api/ {
                      # Configurações de timeout mais generosas
                      proxy_connect_timeout 60s;
                      proxy_send_timeout 60s;
                      proxy_read_timeout 60s;
                      
                      # Headers necessários
                      proxy_set_header Host $host;
                      proxy_set_header X-Real-IP $remote_addr;
                      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                      proxy_set_header X-Forwarded-Proto $scheme;
                      
                      # Endereço do backend com fallback
                      proxy_pass http://backend-service.{{ app_namespace }}.svc.cluster.local:8080;
                      
                      # Melhor handling de erros
                      proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
                      proxy_next_upstream_timeout 60s;
                      proxy_next_upstream_tries 3;
                      
                      # Headers de erro customizados
                      proxy_intercept_errors on;
                      error_page 502 503 504 = @backend_error;
                  }
                  
                  # Página de erro customizada para problemas do backend
                  location @backend_error {
                      return 503 '{"error": "Backend temporariamente indisponível", "message": "Tente novamente em alguns instantes"}';
                      add_header Content-Type application/json;
                  }
                  
                  # Health check para o frontend
                  location /nginx-health {
                      access_log off;
                      return 200 "OK\n";
                      add_header Content-Type text/plain;
                  }
              }

    - name: Deploy do Frontend (Vue.js com Nginx)
      kubernetes.core.k8s:
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: frontend-deployment
            namespace: "{{ app_namespace }}"
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: frontend
            template:
              metadata:
                labels:
                  app: frontend
              spec:
                containers:
                - name: frontend
                  image: "{{ docker_user }}/estacionamento-frontend:latest"
                  imagePullPolicy: Always
                  ports:
                  - containerPort: 80
                  resources:
                    requests:
                      memory: "128Mi"
                      cpu: "100m"
                    limits:
                      memory: "256Mi"
                      cpu: "200m"
                  volumeMounts:
                  - name: nginx-config
                    mountPath: /etc/nginx/conf.d
                  readinessProbe:
                    httpGet:
                      path: /nginx-health
                      port: 80
                    initialDelaySeconds: 10
                    periodSeconds: 5
                    timeoutSeconds: 3
                    failureThreshold: 3
                  livenessProbe:
                    httpGet:
                      path: /nginx-health
                      port: 80
                    initialDelaySeconds: 30
                    periodSeconds: 10
                    timeoutSeconds: 3
                    failureThreshold: 3
                volumes:
                - name: nginx-config
                  configMap:
                    name: nginx-config

    - name: Criar Service para Frontend
      kubernetes.core.k8s:
        definition:
          apiVersion: v1
          kind: Service
          metadata:
            name: frontend-service
            namespace: "{{ app_namespace }}"
          spec:
            selector:
              app: frontend
            ports:
            - port: 80
              targetPort: 80
            type: LoadBalancer

    - name: Aguardar Frontend ficar pronto
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Pod
        namespace: "{{ app_namespace }}"
        label_selectors:
          - app=frontend
        wait: true
        wait_condition:
          type: Ready
          status: "True"
        wait_timeout: 300

    - name: Aguardar LoadBalancer ser provisionado
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Service
        name: frontend-service
        namespace: "{{ app_namespace }}"
        wait: true
        wait_condition:
          type: LoadBalancer
        wait_timeout: 300
      register: frontend_service
      ignore_errors: true

    - name: Obter informações finais do serviço
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Service
        name: frontend-service
        namespace: "{{ app_namespace }}"
      register: frontend_service_final

    - name: Verificar status final de todos os pods
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Pod
        namespace: "{{ app_namespace }}"
      register: final_pod_status

    - name: Teste final de conectividade
      shell: |
        echo "=== TESTE FINAL DE CONECTIVIDADE ==="
        
        # Teste do PostgreSQL
        echo "1. Testando PostgreSQL..."
        kubectl run postgres-final-test --image=postgres:15-alpine --rm -i --restart=Never -n {{ app_namespace }} \
          --env="PGPASSWORD={{ postgres_password }}" -- \
          psql -h postgres-service -U {{ postgres_user }} -d {{ postgres_db }} -c "SELECT 'PostgreSQL OK' as status;" || echo "PostgreSQL: FAIL"
        
        # Teste do Backend (se estiver rodando)
        echo "2. Testando Backend..."
        kubectl run backend-final-test --image=curlimages/curl --rm -i --restart=Never -n {{ app_namespace }} -- \
          curl -f -m 10 http://backend-service:8080/actuator/health || echo "Backend: FAIL"
        
        # Teste do Frontend
        echo "3. Testando Frontend..."
        kubectl run frontend-final-test --image=curlimages/curl --rm -i --restart=Never -n {{ app_namespace }} -- \
          curl -f -m 10 http://frontend-service/nginx-health || echo "Frontend: FAIL"
        
        echo "=== TESTE COMPLETO ==="
      register: final_connectivity_test
      ignore_errors: true

    - name: Exibir resultado final do deploy
      debug:
        msg: |
          🎉 Deploy realizado!
          
          Namespace: {{ app_namespace }}
          
          📊 Status dos Pods:
          {% for pod in final_pod_status.resources %}
          - {{ pod.metadata.name }}: {{ pod.status.phase }}
            Ready: {{ pod.status.containerStatuses[0].ready if pod.status.containerStatuses else 'N/A' }}
            Restarts: {{ pod.status.containerStatuses[0].restartCount if pod.status.containerStatuses else 'N/A' }}
          {% endfor %}
          
          🌐 Serviços:
          - PostgreSQL: postgres-service.{{ app_namespace }}.svc.cluster.local:5432
          - Backend: backend-service.{{ app_namespace }}.svc.cluster.local:8080  
          - Frontend: frontend-service:80
          
          {% if frontend_service_final.resources[0].status.loadBalancer.ingress is defined %}
          🚀 IP Externo: {{ frontend_service_final.resources[0].status.loadBalancer.ingress[0].ip }}
          🌍 Acesse: http://{{ frontend_service_final.resources[0].status.loadBalancer.ingress[0].ip }}
          {% else %}
          ⏳ LoadBalancer sendo provisionado...
          Execute: kubectl get service frontend-service -n {{ app_namespace }}
          {% endif %}
          
          🔧 Testes de Conectividade:
          {{ final_connectivity_test.stdout }}
          
          📋 Para monitorar e diagnosticar:
          kubectl get pods -n {{ app_namespace }} -w
          kubectl logs -f deployment/backend-deployment -n {{ app_namespace }}
          kubectl logs -f deployment/frontend-deployment -n {{ app_namespace }}
          
          🩺 Para debug específico do backend:
          kubectl exec -it deployment/backend-deployment -n {{ app_namespace }} -- curl localhost:8080/actuator/health
          kubectl describe pod -l app=backend -n {{ app_namespace }}

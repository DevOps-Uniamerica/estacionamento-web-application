---
- name: Deploy da aplicação no cluster Kubernetes GCP (com limpeza automática)
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    cluster_name: "{{ cluster_name }}"
    cluster_location: "{{ cluster_location }}"
    project_id: "celtic-shape-452222-c9"
    docker_user: "{{ docker_user }}"
    app_namespace: "estacionamento"
    # Definir credenciais consistentes do PostgreSQL
    postgres_user: "postgres"
    postgres_password: "postgres"
    postgres_db: "estacionamento"

  tasks:
    # ===============================
    # LIMPEZA COMPLETA ANTES DO DEPLOY
    # ===============================
    - name: "🧹 LIMPEZA: Verificar se namespace existe"
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Namespace
        name: "{{ app_namespace }}"
      register: namespace_check
      ignore_errors: true

    - name: "🧹 LIMPEZA: Remover todos os recursos do namespace"
      when: namespace_check.resources | length > 0
      block:
        - name: "🧹 LIMPEZA: Listar todos os recursos existentes"
          shell: |
            echo "=== RECURSOS ENCONTRADOS ==="
            kubectl get all -n {{ app_namespace }} || echo "Nenhum recurso encontrado"
            kubectl get pvc -n {{ app_namespace }} || echo "Nenhum PVC encontrado"
            kubectl get secrets -n {{ app_namespace }} || echo "Nenhum secret encontrado"
            kubectl get configmaps -n {{ app_namespace }} || echo "Nenhum configmap encontrado"
          register: existing_resources

        - name: "🧹 LIMPEZA: Mostrar recursos existentes"
          debug:
            msg: "{{ existing_resources.stdout }}"

        - name: "🧹 LIMPEZA: Forçar remoção de todos os deployments"
          kubernetes.core.k8s:
            api_version: apps/v1
            kind: Deployment
            namespace: "{{ app_namespace }}"
            state: absent
            wait: true
            wait_timeout: 120
          ignore_errors: true

        - name: "🧹 LIMPEZA: Forçar remoção de todos os services"
          kubernetes.core.k8s:
            api_version: v1
            kind: Service
            namespace: "{{ app_namespace }}"
            state: absent
            wait: true
            wait_timeout: 60
          ignore_errors: true

        - name: "🧹 LIMPEZA: Forçar remoção de todos os PVCs"
          kubernetes.core.k8s:
            api_version: v1
            kind: PersistentVolumeClaim
            namespace: "{{ app_namespace }}"
            state: absent
            wait: true
            wait_timeout: 120
          ignore_errors: true

        - name: "🧹 LIMPEZA: Forçar remoção de todos os secrets"
          kubernetes.core.k8s:
            api_version: v1
            kind: Secret
            namespace: "{{ app_namespace }}"
            state: absent
          ignore_errors: true

        - name: "🧹 LIMPEZA: Forçar remoção de todos os configmaps"
          kubernetes.core.k8s:
            api_version: v1
            kind: ConfigMap
            namespace: "{{ app_namespace }}"
            state: absent
          ignore_errors: true

        - name: "🧹 LIMPEZA: Aguardar pods terminarem completamente"
          shell: |
            echo "Aguardando pods terminarem..."
            for i in {1..30}; do
              PODS=$(kubectl get pods -n {{ app_namespace }} --no-headers 2>/dev/null | wc -l)
              if [ "$PODS" -eq "0" ]; then
                echo "✅ Todos os pods foram removidos"
                break
              fi
              echo "Ainda existem $PODS pods. Aguardando... ($i/30)"
              sleep 5
            done
          register: pod_cleanup

        - name: "🧹 LIMPEZA: Resultado da limpeza de pods"
          debug:
            msg: "{{ pod_cleanup.stdout }}"

        - name: "🧹 LIMPEZA: Deletar namespace completamente"
          kubernetes.core.k8s:
            api_version: v1
            kind: Namespace
            name: "{{ app_namespace }}"
            state: absent
            wait: true
            wait_timeout: 180

        - name: "🧹 LIMPEZA: Aguardar namespace ser completamente removido"
          shell: |
            echo "Aguardando namespace ser removido..."
            for i in {1..60}; do
              if ! kubectl get namespace {{ app_namespace }} 2>/dev/null; then
                echo "✅ Namespace removido com sucesso"
                break
              fi
              echo "Namespace ainda existe. Aguardando... ($i/60)"
              sleep 3
            done

    - name: "🧹 LIMPEZA: Limpar volumes órfãos no cluster"
      shell: |
        echo "=== LIMPANDO VOLUMES ÓRFÃOS ==="
        # Listar PVs disponíveis que podem estar órfãos
        kubectl get pv | grep Available || echo "Nenhum volume órfão encontrado"
        
        # Forçar garbage collection
        kubectl delete pods --field-selector=status.phase==Succeeded --all-namespaces || true
        kubectl delete pods --field-selector=status.phase==Failed --all-namespaces || true
      register: volume_cleanup
      ignore_errors: true

    - name: "🧹 LIMPEZA: Resultado da limpeza de volumes"
      debug:
        msg: "{{ volume_cleanup.stdout }}"

    # ===============================
    # INSTALAÇÃO DE DEPENDÊNCIAS
    # ===============================
    - name: Instalar dependências necessárias
      pip:
        name:
          - kubernetes
          - google-auth
          - google-cloud-container
        state: present

    - name: Configurar kubectl para conectar ao cluster GKE
      shell: |
        gcloud container clusters get-credentials {{ cluster_name }} \
          --location {{ cluster_location }} \
          --project {{ project_id }}

    - name: Verificar conectividade com o cluster
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Node
      register: nodes_info

    - name: Debug informações do cluster
      debug:
        msg: |
          🎯 Cluster conectado com sucesso!
          Nodes disponíveis: {{ nodes_info.resources | length }}
          {% for node in nodes_info.resources %}
          - {{ node.metadata.name }}: {{ node.status.conditions | selectattr('type', 'equalto', 'Ready') | map(attribute='status') | first }}
          {% endfor %}

    # ===============================
    # CRIAÇÃO DO AMBIENTE LIMPO
    # ===============================
    - name: "🔨 DEPLOY: Criar namespace da aplicação"
      kubernetes.core.k8s:
        name: "{{ app_namespace }}"
        api_version: v1
        kind: Namespace
        state: present

    - name: "🔨 DEPLOY: Criar Secret para credenciais do PostgreSQL"
      kubernetes.core.k8s:
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: postgres-secret
            namespace: "{{ app_namespace }}"
          type: Opaque
          stringData:
            POSTGRES_USER: "{{ postgres_user }}"
            POSTGRES_PASSWORD: "{{ postgres_password }}"
            POSTGRES_DB: "{{ postgres_db }}"

    - name: "🔨 DEPLOY: Criar PersistentVolumeClaim para o banco PostgreSQL"
      kubernetes.core.k8s:
        definition:
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: postgres-pvc
            namespace: "{{ app_namespace }}"
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 5Gi
            storageClassName: standard-rwo

    - name: "🔨 DEPLOY: Verificar se PVC foi criado"
      kubernetes.core.k8s_info:
        api_version: v1
        kind: PersistentVolumeClaim
        name: postgres-pvc
        namespace: "{{ app_namespace }}"
        wait: true
        wait_condition:
          type: Bound
        wait_timeout: 120
      register: pvc_info

    - name: "🔨 DEPLOY: Debug PVC"
      debug:
        msg: |
          ✅ PVC Status: {{ pvc_info.resources[0].status.phase if pvc_info.resources else 'Not found' }}

    # ===============================
    # DEPLOY DO POSTGRESQL OTIMIZADO
    # ===============================
    - name: "🐘 POSTGRES: Deploy do PostgreSQL"
      kubernetes.core.k8s:
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: postgres-deployment
            namespace: "{{ app_namespace }}"
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: postgres
            template:
              metadata:
                labels:
                  app: postgres
              spec:
                # Garantir que vai para um node saudável
                nodeSelector:
                  kubernetes.io/os: linux
                containers:
                - name: postgres
                  image: postgres:15-alpine
                  env:
                  - name: POSTGRES_DB
                    valueFrom:
                      secretKeyRef:
                        name: postgres-secret
                        key: POSTGRES_DB
                  - name: POSTGRES_USER
                    valueFrom:
                      secretKeyRef:
                        name: postgres-secret
                        key: POSTGRES_USER
                  - name: POSTGRES_PASSWORD
                    valueFrom:
                      secretKeyRef:
                        name: postgres-secret
                        key: POSTGRES_PASSWORD
                  - name: PGDATA
                    value: /var/lib/postgresql/data/pgdata
                  - name: POSTGRES_INITDB_ARGS
                    value: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
                  ports:
                  - containerPort: 5432
                  volumeMounts:
                  - name: postgres-storage
                    mountPath: /var/lib/postgresql/data
                  resources:
                    requests:
                      memory: "256Mi"
                      cpu: "250m"
                    limits:
                      memory: "512Mi"
                      cpu: "500m"
                  # Probes mais tolerantes
                  readinessProbe:
                    exec:
                      command:
                        - /bin/sh
                        - -c
                        - pg_isready -U {{ postgres_user }} -d {{ postgres_db }}
                    initialDelaySeconds: 30
                    periodSeconds: 10
                    timeoutSeconds: 5
                    failureThreshold: 3
                  livenessProbe:
                    exec:
                      command:
                        - /bin/sh
                        - -c
                        - pg_isready -U {{ postgres_user }} -d {{ postgres_db }}
                    initialDelaySeconds: 60
                    periodSeconds: 30
                    timeoutSeconds: 10
                    failureThreshold: 3
                  # Garantir inicialização limpa
                  lifecycle:
                    preStop:
                      exec:
                        command:
                        - /bin/sh
                        - -c
                        - pg_ctl stop -D /var/lib/postgresql/data/pgdata -w -t 60 -m fast
                volumes:
                - name: postgres-storage
                  persistentVolumeClaim:
                    claimName: postgres-pvc

    - name: "🐘 POSTGRES: Criar Service para PostgreSQL"
      kubernetes.core.k8s:
        definition:
          apiVersion: v1
          kind: Service
          metadata:
            name: postgres-service
            namespace: "{{ app_namespace }}"
          spec:
            selector:
              app: postgres
            ports:
            - port: 5432
              targetPort: 5432
            type: ClusterIP

    # ===============================
    # AGUARDAR POSTGRESQL COM TIMEOUT MAIOR
    # ===============================
    - name: "🐘 POSTGRES: Aguardar deployment ser criado"
      kubernetes.core.k8s_info:
        api_version: apps/v1
        kind: Deployment
        name: postgres-deployment
        namespace: "{{ app_namespace }}"
        wait: true
        wait_condition:
          type: Available
          status: "True"
        wait_timeout: 300
      register: postgres_deployment

    - name: "🐘 POSTGRES: Verificar status do deployment"
      debug:
        msg: |
          PostgreSQL Deployment Status:
          Available Replicas: {{ postgres_deployment.resources[0].status.availableReplicas | default(0) }}
          Ready Replicas: {{ postgres_deployment.resources[0].status.readyReplicas | default(0) }}
          Replicas: {{ postgres_deployment.resources[0].status.replicas | default(0) }}

    - name: "🐘 POSTGRES: Aguardar pod ficar realmente pronto"
      shell: |
        echo "Aguardando PostgreSQL pod ficar pronto..."
        kubectl wait --for=condition=ready pod -l app=postgres -n {{ app_namespace }} --timeout=600s
      register: postgres_pod_wait
      ignore_errors: true

    - name: "🐘 POSTGRES: Verificar se falhou e fazer diagnóstico"
      when: postgres_pod_wait.rc != 0
      block:
        - name: "🔍 DIAGNÓSTICO: Obter status dos pods PostgreSQL"
          shell: |
            echo "=== STATUS DOS PODS POSTGRESQL ==="
            kubectl get pods -n {{ app_namespace }} -l app=postgres -o wide
            echo ""
            echo "=== DESCRIBE DOS PODS ==="
            for pod in $(kubectl get pods -n {{ app_namespace }} -l app=postgres -o jsonpath='{.items[*].metadata.name}'); do
              echo "--- Pod: $pod ---"
              kubectl describe pod -n {{ app_namespace }} $pod
              echo ""
              echo "--- Logs do Pod: $pod ---"
              kubectl logs -n {{ app_namespace }} $pod --tail=100 || echo "Não foi possível obter logs"
              echo ""
            done
          register: postgres_diagnostic

        - name: "🔍 DIAGNÓSTICO: Mostrar diagnóstico PostgreSQL"
          debug:
            msg: "{{ postgres_diagnostic.stdout }}"

        - name: "🔍 DIAGNÓSTICO: Verificar eventos do namespace"
          shell: kubectl get events -n {{ app_namespace }} --sort-by='.lastTimestamp' --no-headers | tail -20
          register: namespace_events

        - name: "🔍 DIAGNÓSTICO: Mostrar eventos recentes"
          debug:
            msg: "{{ namespace_events.stdout }}"

        - name: "❌ FALHA: PostgreSQL não ficou pronto"
          fail:
            msg: |
              PostgreSQL não conseguiu ficar pronto após 10 minutos.
              Verifique os logs de diagnóstico acima.
              
              Possíveis soluções:
              1. Verificar se o PVC foi montado corretamente
              2. Verificar recursos disponíveis no cluster
              3. Verificar logs do container PostgreSQL
              4. Re-executar o playbook (limpeza automática será feita)

    - name: "🐘 POSTGRES: Testar conectividade"
      shell: |
        kubectl run postgres-test-{{ ansible_date_time.epoch }} \
          --image=postgres:15-alpine --rm -i --restart=Never -n {{ app_namespace }} \
          --env="PGPASSWORD={{ postgres_password }}" -- \
          psql -h postgres-service -U {{ postgres_user }} -d {{ postgres_db }} -c "SELECT version();" \
          --connect-timeout=10
      register: postgres_connectivity
      ignore_errors: true

    - name: "🐘 POSTGRES: Debug conectividade"
      debug:
        msg: |
          Teste de conectividade PostgreSQL:
          {% if postgres_connectivity.rc == 0 %}
          ✅ Conectividade OK
          Output: {{ postgres_connectivity.stdout }}
          {% else %}
          ❌ Falha na conectividade
          Error: {{ postgres_connectivity.stderr }}
          {% endif %}

    # ===============================
    # DEPLOY DO BACKEND
    # ===============================
    - name: "☕ BACKEND: Deploy do Backend (Spring Boot)"
      kubernetes.core.k8s:
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: backend-deployment
            namespace: "{{ app_namespace }}"
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: backend
            template:
              metadata:
                labels:
                  app: backend
              spec:
                # Aguardar PostgreSQL com init container
                initContainers:
                - name: wait-for-postgres
                  image: postgres:15-alpine
                  env:
                  - name: PGPASSWORD
                    value: "{{ postgres_password }}"
                  command:
                    - sh
                    - -c
                    - |
                      echo "Aguardando PostgreSQL ficar disponível..."
                      until pg_isready -h postgres-service -p 5432 -U {{ postgres_user }} -t 5; do
                        echo "PostgreSQL não está pronto. Aguardando..."
                        sleep 5
                      done
                      echo "PostgreSQL está pronto!"
                      # Testar conexão real
                      psql -h postgres-service -U {{ postgres_user }} -d {{ postgres_db }} -c "SELECT 1;" --connect-timeout=10
                      echo "Conexão com banco confirmada!"
                containers:
                - name: backend
                  image: "{{ docker_user }}/estacionamento-backend:latest"
                  imagePullPolicy: Always
                  env:
                  - name: SPRING_DATASOURCE_URL
                    value: "jdbc:postgresql://postgres-service:5432/{{ postgres_db }}"
                  - name: SPRING_DATASOURCE_USERNAME
                    value: "{{ postgres_user }}"
                  - name: SPRING_DATASOURCE_PASSWORD
                    value: "{{ postgres_password }}"
                  - name: JAVA_OPTS
                    value: "-Xmx512m -Xms256m"
                  - name: SPRING_JPA_HIBERNATE_DDL_AUTO
                    value: "update"
                  - name: SPRING_JPA_SHOW_SQL
                    value: "true"
                  ports:
                  - containerPort: 8080
                  resources:
                    requests:
                      memory: "512Mi"
                      cpu: "250m"
                    limits:
                      memory: "1Gi"
                      cpu: "500m"
                  readinessProbe:
                    httpGet:
                      path: /actuator/health
                      port: 8080
                    initialDelaySeconds: 90
                    periodSeconds: 10
                    timeoutSeconds: 10
                    failureThreshold: 5
                  livenessProbe:
                    httpGet:
                      path: /actuator/health
                      port: 8080
                    initialDelaySeconds: 180
                    periodSeconds: 30
                    timeoutSeconds: 10
                    failureThreshold: 5

    - name: "☕ BACKEND: Criar Service para Backend"
      kubernetes.core.k8s:
        definition:
          apiVersion: v1
          kind: Service
          metadata:
            name: backend-service
            namespace: "{{ app_namespace }}"
          spec:
            selector:
              app: backend
            ports:
            - port: 8080
              targetPort: 8080
            type: ClusterIP

    - name: "☕ BACKEND: Aguardar Backend ficar pronto"
      shell: |
        echo "Aguardando Backend pod ficar pronto..."
        kubectl wait --for=condition=ready pod -l app=backend -n {{ app_namespace }} --timeout=900s
      register: backend_wait
      ignore_errors: true

    - name: "☕ BACKEND: Diagnóstico em caso de falha"
      when: backend_wait.rc != 0
      block:
        - name: "🔍 DIAGNÓSTICO: Status do Backend"
          shell: |
            echo "=== BACKEND PODS ==="
            kubectl get pods -n {{ app_namespace }} -l app=backend -o wide
            echo ""
            for pod in $(kubectl get pods -n {{ app_namespace }} -l app=backend -o jsonpath='{.items[*].metadata.name}'); do
              echo "=== LOGS INIT CONTAINER - $pod ==="
              kubectl logs -n {{ app_namespace }} $pod -c wait-for-postgres --tail=50 || echo "Sem logs do init container"
              echo ""
              echo "=== LOGS BACKEND - $pod ==="
              kubectl logs -n {{ app_namespace }} $pod -c backend --tail=100 || echo "Sem logs do backend"
              echo ""
            done
          register: backend_diagnostic

        - name: "🔍 DIAGNÓSTICO: Mostrar logs do Backend"
          debug:
            msg: "{{ backend_diagnostic.stdout }}"

        - name: "⚠️ AVISO: Backend não ficou pronto, mas continuando..."
          debug:
            msg: "Backend não ficou pronto em 15 minutos, mas continuando com o frontend..."

    # ===============================
    # DEPLOY DO FRONTEND
    # ===============================
    - name: "🌐 FRONTEND: Criar ConfigMap para Nginx"
      kubernetes.core.k8s:
        definition:
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: nginx-config
            namespace: "{{ app_namespace }}"
          data:
            default.conf: |
              server {
                  listen 80;
                  server_name localhost;
                  
                  location / {
                      root /usr/share/nginx/html;
                      index index.html index.htm;
                      try_files $uri $uri/ /index.html;
                  }
                  
                  location /api/ {
                      proxy_pass http://backend-service:8080/;
                      proxy_set_header Host $host;
                      proxy_set_header X-Real-IP $remote_addr;
                      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                      proxy_set_header X-Forwarded-Proto $scheme;
                      proxy_connect_timeout 30s;
                      proxy_send_timeout 30s;
                      proxy_read_timeout 30s;
                      proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
                  }
                  
                  error_page 500 502 503 504 /50x.html;
                  location = /50x.html {
                      root /usr/share/nginx/html;
                  }
              }

    - name: "🌐 FRONTEND: Deploy do Frontend"
      kubernetes.core.k8s:
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: frontend-deployment
            namespace: "{{ app_namespace }}"
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: frontend
            template:
              metadata:
                labels:
                  app: frontend
              spec:
                containers:
                - name: frontend
                  image: "{{ docker_user }}/estacionamento-frontend:latest"
                  imagePullPolicy: Always
                  ports:
                  - containerPort: 80
                  resources:
                    requests:
                      memory: "128Mi"
                      cpu: "100m"
                    limits:
                      memory: "256Mi"
                      cpu: "200m"
                  volumeMounts:
                  - name: nginx-config
                    mountPath: /etc/nginx/conf.d
                  readinessProbe:
                    httpGet:
                      path: /
                      port: 80
                    initialDelaySeconds: 10
                    periodSeconds: 5
                    timeoutSeconds: 5
                    failureThreshold: 3
                  livenessProbe:
                    httpGet:
                      path: /
                      port: 80
                    initialDelaySeconds: 30
                    periodSeconds: 10
                    timeoutSeconds: 5
                    failureThreshold: 3
                volumes:
                - name: nginx-config
                  configMap:
                    name: nginx-config

    - name: "🌐 FRONTEND: Criar Service para Frontend"
      kubernetes.core.k8s:
        definition:
          apiVersion: v1
          kind: Service
          metadata:
            name: frontend-service
            namespace: "{{ app_namespace }}"
          spec:
            selector:
              app: frontend
            ports:
            - port: 80
              targetPort: 80
            type: LoadBalancer

    - name: "🌐 FRONTEND: Aguardar Frontend ficar pronto"
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Pod
        namespace: "{{ app_namespace }}"
        label_selectors:
          - app=frontend
        wait: true
        wait_condition:
          type: Ready
          status: "True"
        wait_timeout: 300

    - name: "🌐 FRONTEND: Aguardar LoadBalancer ser provisionado"
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Service
        name: frontend-service
        namespace: "{{ app_namespace }}"
        wait: true
        wait_condition:
          type: LoadBalancer
        wait_timeout: 300
      register: frontend_service
      ignore_errors: true

    # ===============================
    # RESULTADO FINAL
    # ===============================
    - name: "📊 RESULTADO: Obter informações finais"
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Service
        name: frontend-service
        namespace: "{{ app_namespace }}"
      register: frontend_service_final

    - name: "📊 RESULTADO: Verificar status final de todos os pods"
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Pod
        namespace: "{{ app_namespace }}"
      register: final_pod_status

    - name: "🎉 SUCESSO: Exibir resultado final do deploy"
      debug:
        msg: |
          
          ╔══════════════════════════════════════════════════════════════╗
          ║                    🎉 DEPLOY CONCLUÍDO! 🎉                   ║
          ╚══════════════════════════════════════════════════════════════╝
          
          📋 Namespace: {{ app_namespace }}
          
          📊 Status dos Pods:
          {% for pod in final_pod_status.resources %}
          - {{ pod.metadata.name }}: {{ pod.status.phase }}
            └─ Ready: {{ pod.status.containerStatuses[0].ready if pod.status.containerStatuses else 'N/A' }}
            └─ Restarts: {{ pod.status.containerStatuses[0].restartCount if pod.status.containerStatuses else 'N/A' }}
          {% endfor %}
          
          🔗 Serviços Disponíveis:
          - 🐘 PostgreSQL: postgres-service:5432
          - ☕ Backend: backend-service:8080  
          - 🌐 Frontend: frontend-service:80
          
          {% if frontend_service_final.resources[0].status.loadBalancer.ingress is defined %}
          🚀 APLICAÇÃO DISPONÍVEL EM:
          🌍 http://{{ frontend_service_final.resources[0].status.loadBalancer.ingress[0].ip }}
          {% else %}
          ⏳ LoadBalancer sendo provisionado...
          Execute: kubectl get service frontend-service -n {{ app_namespace }}
          {% endif %}
          
          📋 Comandos úteis para monitoramento:
          kubectl get pods -n {{ app_namespace }} -w
          kubectl get services -n {{ app_namespace }}
          kubectl logs -f deployment/backend-deployment -n {{ app_namespace }}
          
          ✅ Deploy realizado com limpeza automática ativada!

---
- name: Deploy da aplicação no cluster Kubernetes GCP
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    cluster_name: "{{ cluster_name }}"
    cluster_location: "{{ cluster_location }}"
    project_id: "celtic-shape-452222-c9"
    docker_user: "{{ docker_user }}"
    app_namespace: "estacionamento"
    # Usar Secret em vez de ConfigMap para senha
    postgres_password: "postgres123"  # Defina uma senha mais segura

  tasks:
    - name: Instalar dependências necessárias
      pip:
        name:
          - kubernetes
          - google-auth
          - google-cloud-container
        state: present

    - name: Configurar kubectl para conectar ao cluster GKE
      shell: |
        gcloud container clusters get-credentials {{ cluster_name }} \
          --location {{ cluster_location }} \
          --project {{ project_id }}

    - name: Verificar conectividade com o cluster
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Node
      register: nodes_info

    - name: Debug informações do cluster
      debug:
        msg: |
          Cluster conectado com sucesso!
          Nodes disponíveis: {{ nodes_info.resources | length }}
          {% for node in nodes_info.resources %}
          - {{ node.metadata.name }}: {{ node.status.conditions | selectattr('type', 'equalto', 'Ready') | map(attribute='status') | first }}
          {% endfor %}

    - name: Criar namespace da aplicação
      kubernetes.core.k8s:
        name: "{{ app_namespace }}"
        api_version: v1
        kind: Namespace
        state: present

    # CORREÇÃO 1: Usar Secret em vez de ConfigMap para credenciais
    - name: Criar Secret para credenciais do banco
      kubernetes.core.k8s:
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: postgres-secret
            namespace: "{{ app_namespace }}"
          type: Opaque
          data:
            # Valores em base64
            POSTGRES_DB: "{{ 'estacionamento' | b64encode }}"
            POSTGRES_USER: "{{ 'postgres' | b64encode }}"
            POSTGRES_PASSWORD: "{{ postgres_password | b64encode }}"

    - name: Criar PersistentVolumeClaim para o banco PostgreSQL
      kubernetes.core.k8s:
        definition:
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: postgres-pvc
            namespace: "{{ app_namespace }}"
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 5Gi
            storageClassName: standard-rwo

    - name: Verificar se PVC foi criado
      kubernetes.core.k8s_info:
        api_version: v1
        kind: PersistentVolumeClaim
        name: postgres-pvc
        namespace: "{{ app_namespace }}"
      register: pvc_info

    - name: Debug PVC
      debug:
        msg: |
          PVC Status: {{ pvc_info.resources[0].status.phase if pvc_info.resources else 'Not found' }}

    # CORREÇÃO 2: PostgreSQL com configuração melhorada
    - name: Deploy do PostgreSQL
      kubernetes.core.k8s:
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: postgres-deployment
            namespace: "{{ app_namespace }}"
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: postgres
            template:
              metadata:
                labels:
                  app: postgres
              spec:
                containers:
                - name: postgres
                  image: postgres:15-alpine
                  env:
                  - name: POSTGRES_DB
                    valueFrom:
                      secretKeyRef:
                        name: postgres-secret
                        key: POSTGRES_DB
                  - name: POSTGRES_USER
                    valueFrom:
                      secretKeyRef:
                        name: postgres-secret
                        key: POSTGRES_USER
                  - name: POSTGRES_PASSWORD
                    valueFrom:
                      secretKeyRef:
                        name: postgres-secret
                        key: POSTGRES_PASSWORD
                  - name: PGDATA
                    value: /var/lib/postgresql/data/pgdata
                  # CORREÇÃO 3: Configurações adicionais para melhor funcionamento
                  - name: POSTGRES_INITDB_ARGS
                    value: "--auth-host=scram-sha-256 --auth-local=trust"
                  ports:
                  - containerPort: 5432
                  volumeMounts:
                  - name: postgres-storage
                    mountPath: /var/lib/postgresql/data
                  resources:
                    requests:
                      memory: "256Mi"
                      cpu: "250m"
                    limits:
                      memory: "512Mi"
                      cpu: "500m"
                  # CORREÇÃO 4: Health checks melhorados
                  readinessProbe:
                    exec:
                      command:
                        - /bin/sh
                        - -c
                        - pg_isready -U postgres -d estacionamento
                    initialDelaySeconds: 10
                    periodSeconds: 5
                    timeoutSeconds: 5
                    failureThreshold: 6
                  livenessProbe:
                    exec:
                      command:
                        - /bin/sh
                        - -c
                        - pg_isready -U postgres -d estacionamento
                    initialDelaySeconds: 30
                    periodSeconds: 10
                    timeoutSeconds: 5
                    failureThreshold: 3
                volumes:
                - name: postgres-storage
                  persistentVolumeClaim:
                    claimName: postgres-pvc

    - name: Criar Service para PostgreSQL
      kubernetes.core.k8s:
        definition:
          apiVersion: v1
          kind: Service
          metadata:
            name: postgres-service
            namespace: "{{ app_namespace }}"
          spec:
            selector:
              app: postgres
            ports:
            - port: 5432
              targetPort: 5432
            type: ClusterIP

    # CORREÇÃO 5: Aguardar PostgreSQL de forma mais robusta
    - name: Aguardar PostgreSQL deployment
      kubernetes.core.k8s_info:
        api_version: apps/v1
        kind: Deployment
        name: postgres-deployment
        namespace: "{{ app_namespace }}"
        wait: true
        wait_condition:
          type: Available
          status: "True"
        wait_timeout: 300

    - name: Aguardar PostgreSQL pod ficar pronto
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Pod
        namespace: "{{ app_namespace }}"
        label_selectors:
          - app=postgres
        wait: true
        wait_condition:
          type: Ready
          status: "True"
        wait_timeout: 300

    # CORREÇÃO 6: Teste de conectividade com senha correta
    - name: Verificar conectividade com PostgreSQL
      shell: |
        kubectl run postgres-test --image=postgres:15-alpine --rm -i --restart=Never -n {{ app_namespace }} \
          --env="PGPASSWORD={{ postgres_password }}" -- \
          psql -h postgres-service -U postgres -d estacionamento -c "SELECT version();"
      register: postgres_connectivity
      ignore_errors: true

    - name: Debug conectividade PostgreSQL
      debug:
        msg: |
          Teste de conectividade PostgreSQL:
          {% if postgres_connectivity.rc == 0 %}
          ✅ Conectividade OK
          Output: {{ postgres_connectivity.stdout }}
          {% else %}
          ❌ Falha na conectividade
          Error: {{ postgres_connectivity.stderr }}
          {% endif %}

    # CORREÇÃO 7: Backend com configuração corrigida
    - name: Deploy do Backend (Spring Boot)
      kubernetes.core.k8s:
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: backend-deployment
            namespace: "{{ app_namespace }}"
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: backend
            template:
              metadata:
                labels:
                  app: backend
              spec:
                # Init container melhorado
                initContainers:
                - name: wait-for-postgres
                  image: postgres:15-alpine
                  env:
                  - name: PGPASSWORD
                    valueFrom:
                      secretKeyRef:
                        name: postgres-secret
                        key: POSTGRES_PASSWORD
                  command:
                    - sh
                    - -c
                    - |
                      echo "Aguardando PostgreSQL..."
                      until pg_isready -h postgres-service -p 5432 -U postgres; do
                        echo "PostgreSQL não está pronto, aguardando..."
                        sleep 5
                      done
                      echo "PostgreSQL está respondendo, testando conexão..."
                      until psql -h postgres-service -U postgres -d estacionamento -c "SELECT 1;" > /dev/null 2>&1; do
                        echo "Aguardando banco de dados ficar totalmente pronto..."
                        sleep 5
                      done
                      echo "PostgreSQL está pronto!"
                containers:
                - name: backend
                  image: "{{ docker_user }}/estacionamento-backend:latest"
                  imagePullPolicy: Always
                  env:
                  - name: SPRING_DATASOURCE_URL
                    value: "jdbc:postgresql://postgres-service:5432/estacionamento"
                  - name: SPRING_DATASOURCE_USERNAME
                    valueFrom:
                      secretKeyRef:
                        name: postgres-secret
                        key: POSTGRES_USER
                  - name: SPRING_DATASOURCE_PASSWORD
                    valueFrom:
                      secretKeyRef:
                        name: postgres-secret
                        key: POSTGRES_PASSWORD
                  - name: JAVA_OPTS
                    value: "-Xmx512m -Xms256m"
                  - name: SPRING_JPA_HIBERNATE_DDL_AUTO
                    value: "update"
                  # CORREÇÃO 8: Configurações adicionais do Spring
                  - name: SPRING_DATASOURCE_DRIVER_CLASS_NAME
                    value: "org.postgresql.Driver"
                  - name: SPRING_JPA_DATABASE_PLATFORM
                    value: "org.hibernate.dialect.PostgreSQLDialect"
                  - name: SPRING_JPA_SHOW_SQL
                    value: "true"
                  ports:
                  - containerPort: 8080
                  resources:
                    requests:
                      memory: "512Mi"
                      cpu: "250m"
                    limits:
                      memory: "1Gi"
                      cpu: "500m"
                  # Health checks ajustados
                  readinessProbe:
                    httpGet:
                      path: /actuator/health
                      port: 8080
                    initialDelaySeconds: 90
                    periodSeconds: 10
                    timeoutSeconds: 10
                    failureThreshold: 6
                  livenessProbe:
                    httpGet:
                      path: /actuator/health
                      port: 8080
                    initialDelaySeconds: 120
                    periodSeconds: 30
                    timeoutSeconds: 10
                    failureThreshold: 6

    - name: Criar Service para Backend
      kubernetes.core.k8s:
        definition:
          apiVersion: v1
          kind: Service
          metadata:
            name: backend-service
            namespace: "{{ app_namespace }}"
          spec:
            selector:
              app: backend
            ports:
            - port: 8080
              targetPort: 8080
            type: ClusterIP

    # CORREÇÃO 9: Aguardar backend com mais tempo e melhor tratamento de erro
    - name: Aguardar Backend ficar pronto
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Pod
        namespace: "{{ app_namespace }}"
        label_selectors:
          - app=backend
        wait: true
        wait_condition:
          type: Ready
          status: "True"
        wait_timeout: 900  # 15 minutos
      register: backend_wait_result
      ignore_errors: true

    - name: Verificar se backend falhou e mostrar logs
      block:
        - name: Obter logs do Backend se falhou
          shell: |
            echo "=== Status dos pods backend ==="
            kubectl get pods -n {{ app_namespace }} -l app=backend
            echo "=== Logs dos pods backend ==="
            for pod in $(kubectl get pods -n {{ app_namespace }} -l app=backend -o jsonpath='{.items[*].metadata.name}'); do
              echo "=== Logs do pod $pod ==="
              kubectl logs -n {{ app_namespace }} $pod --tail=100 || echo "Não foi possível obter logs do pod $pod"
              echo "=== Logs do init container ==="
              kubectl logs -n {{ app_namespace }} $pod -c wait-for-postgres --tail=50 || echo "Não há logs do init container"
            done
          register: backend_debug_logs

        - name: Debug Backend
          debug:
            msg: |
              ❌ Backend pode não estar pronto ainda
              {{ backend_debug_logs.stdout }}
      when: backend_wait_result.failed is defined and backend_wait_result.failed

    - name: Criar ConfigMap para configuração do Nginx (Frontend)
      kubernetes.core.k8s:
        definition:
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: nginx-config
            namespace: "{{ app_namespace }}"
          data:
            default.conf: |
              server {
                  listen 80;
                  server_name localhost;
                  
                  location / {
                      root /usr/share/nginx/html;
                      index index.html index.htm;
                      try_files $uri $uri/ /index.html;
                  }
                  
                  location /api/ {
                      proxy_pass http://backend-service:8080/;
                      proxy_set_header Host $host;
                      proxy_set_header X-Real-IP $remote_addr;
                      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                      proxy_set_header X-Forwarded-Proto $scheme;
                      proxy_connect_timeout 60s;
                      proxy_send_timeout 60s;
                      proxy_read_timeout 60s;
                      proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
                  }
                  
                  error_page 500 502 503 504 /50x.html;
                  location = /50x.html {
                      root /usr/share/nginx/html;
                  }
              }

    - name: Deploy do Frontend (Vue.js com Nginx)
      kubernetes.core.k8s:
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: frontend-deployment
            namespace: "{{ app_namespace }}"
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: frontend
            template:
              metadata:
                labels:
                  app: frontend
              spec:
                containers:
                - name: frontend
                  image: "{{ docker_user }}/estacionamento-frontend:latest"
                  imagePullPolicy: Always
                  ports:
                  - containerPort: 80
                  resources:
                    requests:
                      memory: "128Mi"
                      cpu: "100m"
                    limits:
                      memory: "256Mi"
                      cpu: "200m"
                  volumeMounts:
                  - name: nginx-config
                    mountPath: /etc/nginx/conf.d
                  readinessProbe:
                    httpGet:
                      path: /
                      port: 80
                    initialDelaySeconds: 10
                    periodSeconds: 5
                    timeoutSeconds: 5
                    failureThreshold: 3
                  livenessProbe:
                    httpGet:
                      path: /
                      port: 80
                    initialDelaySeconds: 30
                    periodSeconds: 10
                    timeoutSeconds: 5
                    failureThreshold: 3
                volumes:
                - name: nginx-config
                  configMap:
                    name: nginx-config

    - name: Criar Service para Frontend
      kubernetes.core.k8s:
        definition:
          apiVersion: v1
          kind: Service
          metadata:
            name: frontend-service
            namespace: "{{ app_namespace }}"
          spec:
            selector:
              app: frontend
            ports:
            - port: 80
              targetPort: 80
            type: LoadBalancer

    - name: Aguardar Frontend ficar pronto
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Pod
        namespace: "{{ app_namespace }}"
        label_selectors:
          - app=frontend
        wait: true
        wait_condition:
          type: Ready
          status: "True"
        wait_timeout: 300

    - name: Aguardar LoadBalancer ser provisionado
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Service
        name: frontend-service
        namespace: "{{ app_namespace }}"
        wait: true
        wait_condition:
          type: LoadBalancer
        wait_timeout: 300
      register: frontend_service
      ignore_errors: true

    - name: Obter informações finais do serviço
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Service
        name: frontend-service
        namespace: "{{ app_namespace }}"
      register: frontend_service_final

    - name: Verificar status final de todos os pods
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Pod
        namespace: "{{ app_namespace }}"
      register: final_pod_status

    - name: Exibir resultado final do deploy
      debug:
        msg: |
          🎉 Deploy realizado!
          
          Namespace: {{ app_namespace }}
          
          📊 Status dos Pods:
          {% for pod in final_pod_status.resources %}
          - {{ pod.metadata.name }}: {{ pod.status.phase }}
            Ready: {{ pod.status.containerStatuses[0].ready if pod.status.containerStatuses else 'N/A' }}
            Restarts: {{ pod.status.containerStatuses[0].restartCount if pod.status.containerStatuses else 'N/A' }}
          {% endfor %}
          
          🌐 Serviços:
          - PostgreSQL: postgres-service:5432
          - Backend: backend-service:8080  
          - Frontend: frontend-service:80
          
          {% if frontend_service_final.resources[0].status.loadBalancer.ingress is defined %}
          🚀 IP Externo: {{ frontend_service_final.resources[0].status.loadBalancer.ingress[0].ip }}
          🌍 Acesse: http://{{ frontend_service_final.resources[0].status.loadBalancer.ingress[0].ip }}
          {% else %}
          ⏳ LoadBalancer sendo provisionado...
          Execute: kubectl get service frontend-service -n {{ app_namespace }}
          {% endif %}
          
          📋 Para monitorar:
          kubectl get pods -n {{ app_namespace }} -w
          kubectl get services -n {{ app_namespace }}
          kubectl logs -f deployment/backend-deployment -n {{ app_namespace }}

    # CORREÇÃO 10: Comandos de diagnóstico úteis
    - name: Comandos úteis para diagnóstico
      debug:
        msg: |
          🔧 Comandos úteis para diagnóstico:
          
          # Ver logs em tempo real
          kubectl logs -f deployment/postgres-deployment -n {{ app_namespace }}
          kubectl logs -f deployment/backend-deployment -n {{ app_namespace }}
          kubectl logs -f deployment/frontend-deployment -n {{ app_namespace }}
          
          # Testar conectividade
          kubectl exec -it deployment/postgres-deployment -n {{ app_namespace }} -- psql -U postgres -d estacionamento
          
          # Ver eventos
          kubectl get events -n {{ app_namespace }} --sort-by='.lastTimestamp'
          
          # Descrever recursos
          kubectl describe pod -l app=postgres -n {{ app_namespace }}
          kubectl describe pod -l app=backend -n {{ app_namespace }}
